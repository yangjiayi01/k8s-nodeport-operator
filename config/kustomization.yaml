# Kustomize 聚合配置
# 使用方式: kubectl apply -k config/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: k8s-port-allocator

# 所有资源注入 port-manager 命名空间
namespace: port-manager

# 资源聚合顺序：先 namespace，再 CRD/RBAC，最后 controller Deployment
resources:
  - namespace.yaml
  - crd.yaml
  - rbac.yaml
  - controller-deployment.yaml

# 统一标签（不影响 selector 中的 app 标签）
commonLabels:
  app.kubernetes.io/part-of: k8s-port-allocator

# 镜像映射：构建后可通过 kustomize edit setimage 替换
images:
  - name: k8s-port-allocator
    newTag: latest
